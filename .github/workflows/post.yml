name: Utopia LinkedIn Auto-Post

on:
  schedule:
    # Times are in UTC. Ethiopia is UTC+3.
    - cron: '0 5 * * 2'   # Tuesday 8:00 AM EAT
    - cron: '0 16 * * 4'  # Thursday 7:00 PM EAT
    - cron: '0 15 * * 5'  # Friday 6:00 PM EAT
    - cron: '0 6 * * 6'   # Saturday 9:00 AM EAT

  workflow_dispatch:
    inputs:
      account:
        description: 'Account to post to (personal or company)'
        required: false
        default: 'personal'
        type: choice
        options:
          - personal
          - company
      mode:
        description: 'Posting mode'
        required: false
        default: 'smart'
        type: choice
        options:
          - smart
          - queue
          - auto
          - input
      force:
        description: 'Skip the once-per-day guard (use sparingly)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv notion-client

      - name: Run the posting script
        env:
          LINKEDIN_PERSONAL_TOKEN: ${{ secrets.LINKEDIN_PERSONAL_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_COMPANY_TOKEN: ${{ secrets.LINKEDIN_COMPANY_TOKEN }}
          LINKEDIN_COMPANY_ID: ${{ secrets.LINKEDIN_COMPANY_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          ACCOUNT="${{ github.event.inputs.account || 'personal' }}"
          MODE="${{ github.event.inputs.mode || 'smart' }}"
          echo "Running: python post.py $MODE $ACCOUNT (FORCE=$FORCE)"
          python post.py $MODE $ACCOUNT

      - name: Save changes back to repository
        if: always()
        run: |
          git config user.name "utopia-bot"
          git config user.email "bot@utopia.local"

          # Stage and commit FIRST (so local file moves don't block the rebase).
          git add content_log.json queue/ input/ || true
          if ! git diff --staged --quiet; then
            git commit -m "Auto-post: $(date -u '+%Y-%m-%d %H:%M UTC')"
          else
            echo "No changes to commit."
            exit 0
          fi

          # Now rebase on top of remote and push, with one retry.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $attempt failed. Retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Could not push committed changes after 3 attempts."
          exit 1
